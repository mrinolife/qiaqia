<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>QiaQia 恰恰 · Chinese for the Trip</title>
<meta name="theme-color" content="#fff7ec">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="QiaQia">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="icon-180.png">
</head>
<body>

<header id="topbar">
  <div id="topbarInner">
    <div id="brand">
      <span class="brand-mascot" id="brandMascot"></span>
      <span class="brand-name">QiaQia <span class="brand-cn">恰恰</span></span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="dictBtn" class="iconbtn" title="dictionary" style="width:34px;height:34px">🔍</button>
      <button id="pinBtn" class="iconbtn" title="show/hide pinyin" style="width:34px;height:34px;font-size:.8rem;font-weight:800">拼</button>
      <div id="streakChip" class="chip" title="day streak">🔥 <b id="streakN">0</b></div>
      <button id="profileBtn" class="iconbtn" title="Rachel's page" style="width:34px;height:34px">🌸</button>
    </div>
  </div>
</header>

<div id="appShell">
  <nav id="sideNav">
    <button data-tab="home"    class="tab active"><span>🗺️</span>Path</button>
    <button data-tab="cards"   class="tab"><span>🎴</span>Review</button>
    <button data-tab="quiz"    class="tab"><span>⭐</span>Practice</button>
    <button data-tab="phrases" class="tab"><span>🧳</span>Travel</button>
    <button data-tab="talk"    class="tab"><span>💬</span>Talk</button>
  </nav>
  <main id="view"></main>
  <aside id="sideStats"></aside>
</div>

<nav id="tabs">
  <button data-tab="home"    class="tab active"><span>🗺️</span>Path</button>
  <button data-tab="cards"   class="tab"><span>🎴</span>Review</button>
  <button data-tab="quiz"    class="tab"><span>⭐</span>Practice</button>
  <button data-tab="phrases" class="tab"><span>🧳</span>Travel</button>
  <button data-tab="talk"    class="tab"><span>💬</span>Talk</button>
</nav>

<div id="toast"></div>
<div id="confetti"></div>

<script src="data.js"></script>
<script src="hsk2.js"></script>
<script src="taiwan.js"></script>
<script src="chats.js"></script>
<script src="trad.js"></script>
<script src="strokes.js"></script>
<script src="vendor-hanzi-writer.js"></script>
<script src="app.js"></script>
<script src="engine.js"></script>
<script src="path.js"></script>
</body>
</html>
